name: Sync Main to Team Branches

on:
  push:
    branches:
      - main
  workflow_dispatch:
    inputs:
      branch:
        description: ''
        required: false
        default: ''

permissions:
  contents: write
  pull-requests: write

jobs:
  sync:
    runs-on: ubuntu-latest

    strategy:
      matrix:
        branch: []
      fail-fast: false

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Configure Git
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

      - name: Fetch all branches
        run: |
          git fetch --all --prune

      - name: Sync ${{ matrix.branch }} with main
        run: |
          # Checkout the target branch
          git checkout origin/${{ matrix.branch }}
          
          # Create a local branch from the fetched remote
          git checkout -b ${{ matrix.branch }}
          
          # Merge main into the branch, preferring main's changes
          git merge origin/main \
            --no-edit \
            --no-ff \
            -X ours \
            --allow-unrelated-histories || true

      - name: Push updated branch
        run: |
          git push origin ${{ matrix.branch }}
        continue-on-error: true

      - name: Report sync status
        run: |
          echo "Synced ${{ matrix.branch }} with main"

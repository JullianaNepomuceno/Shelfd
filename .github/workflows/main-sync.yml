name: Auto Sync Main to Develop Teams

on:
  push:
    branches:
      - main

permissions:
  contents: write
  pull-requests: write

jobs:
  sync:
    runs-on: ubuntu-latest

    strategy:
      matrix:
        branch: [develop-team1, develop-team2, develop-team3]

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Configure Git
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

      - name: Fetch all branches completely
        run: |
          git fetch --prune --unshallow || true
          git fetch origin "+refs/heads/*:refs/remotes/origin/*"

      - name: Create forced merge sync branch
        run: |
          # Start from the latest develop branch
          git checkout -B sync/${{ matrix.branch }} origin/${{ matrix.branch }}

          # ALWAYS force merge main into develop
          git merge origin/main --no-edit --no-ff --strategy-option theirs --allow-unrelated-histories || true

      - name: Push sync branch
        run: git push origin sync/${{ matrix.branch }} --force-with-lease

      - name: Create Pull Request
        id: cpr
        uses: peter-evans/create-pull-request@v6
        with:
          branch: sync/${{ matrix.branch }}
          base: ${{ matrix.branch }}
          title: "Sync main → ${{ matrix.branch }}"
          body: |
            Forced sync merge of **main** into **${{ matrix.branch }}**.
            This always runs even if develop is ahead.
            Requires 2 approvals for auto-merge.
          delete-branch: true

      - name: Auto-merge when ready
        if: steps.cpr.outputs.pull-request-number != ''
        uses: actions/github-script@v7
        with:
          script: |
            const prNumber = ${{ steps.cpr.outputs['pull-request-number'] }};
            const pr = await github.pulls.get({
              owner: context.repo.owner,
              repo: context.repo.repo,
              pull_number: prNumber
            });

            if (pr.data.mergeable && pr.data.mergeable_state === "clean") {
              await github.pulls.merge({
                owner: context.repo.owner,
                repo: context.repo.repo,
                pull_number: prNumber,
                merge_method: "squash"
              });
            } else {
              core.info("PR not ready for merge yet.");
            }
# ── Application ───────────────────────────────────────────────────────────────
spring.application.name=shelfd

# ── Database ───────────────────────────────────────────────────────────────────
spring.datasource.url=jdbc:postgresql://localhost:5432/shelfd
spring.datasource.username=postgres
spring.datasource.password=postgres
spring.datasource.driver-class-name=org.postgresql.Driver

# ── JPA / Hibernate ────────────────────────────────────────────────────────────
spring.jpa.database-platform=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true

# ── JWT ────────────────────────────────────────────────────────────────────────
# Replace this with a long random secret (256-bit minimum)
jwt.secret=replace-this-with-a-very-long-random-secret-key-at-least-256-bits
jwt.expiration=86400000